<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inicio de Sesión</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: violet;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.formulario{
    justify-content: center;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#218838;
}

.mensaje{
  text-align:center;
  margin-top:400px;
  position: absolute;
}
.text{
    align-items: normal;
    position: absolute;
    margin-top: -350px;
}
</style>
</head>
    
    <body>
        <div class="text">
    
        <h2 style="text-align: center;">Iniciar Sesión</h2></div>

    
    <form style="text-align: center;"   onsubmit="iniciarSesion(event)">
      <input type="text" id="usuario" placeholder="Usuario" required><br><br>
      <input type="password" id="password" placeholder="Contraseña" required><br><br>
      <input type="password" id="" placeholder="Emai" required><br><br>
      <input type="password" id="" placeholder="Domicilio" required><br><br>
      <button type="submit">Entrar</button>
    </form>
    
    <p  class="mensaje"id="mensaje"></p>
    
    <script>
    function iniciarSesion(event){
      event.preventDefault(); 
      let usuario = document.getElementById("usuario").value;
    
      document.getElementById("mensaje").innerHTML =
        "✅ Bienvenido " + usuario + ", sesión iniciada correctamente";
      
      document.getElementById("mensaje").style.color = "green";
    
      setTimeout(function(){
        window.location.href = "index.html";
      }, 2000);
    }
    </script>
    
    </body>
    </html>
